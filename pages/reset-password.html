<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redirecting to CaliSpot…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 400px;
    width: 100%;
  }
  .logo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: block;
  }
  .brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #F5C842;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  p {
    font-size: 15px;
    color: #888;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-block;
    padding: 15px 36px;
    background: #F5C842;
    color: #0d0d0d;
    text-decoration: none;
    font-weight: 800;
    font-size: 15px;
    border-radius: 10px;
    margin-bottom: 16px;
    width: 100%;
  }
  .status {
    font-size: 13px;
    color: #444;
    margin-top: 24px;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #333;
    border-top-color: #F5C842;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <img
    src="https://nrfwyewylurdmsnxycwz.supabase.co/storage/v1/object/public/images/logos/calilogobg.png"
    alt="CaliSpot"
    class="logo"
  />
  <p class="brand">CALISPOT</p>
  <div class="icon">🔐</div>
  <h1>Opening CaliSpot…</h1>
  <p>You'll be redirected to the app to set your new password. If it doesn't open automatically, tap below.</p>

  <a id="deeplink-btn" href="#" class="btn">Open CaliSpot</a>

  <p class="status">
    <span class="spinner"></span>
    Redirecting automatically…
  </p>
</div>

<script>
  // Parse query params AND hash fragment — Supabase can send tokens either way
  function getParams() {
    const params = {};

    // 1. Query string params (e.g. ?token_hash=xxx&type=recovery)
    new URLSearchParams(window.location.search).forEach((v, k) => { params[k] = v; });

    // 2. Hash fragment params (e.g. #access_token=xxx&type=recovery)
    if (window.location.hash) {
      const hash = window.location.hash.substring(1);
      new URLSearchParams(hash).forEach((v, k) => { params[k] = v; });
    }

    return params;
  }

  const params = getParams();

  // Build the deep link — pass all params through so the app can exchange the token
  function buildDeepLink() {
    const base = 'calispot://reset-password';
    const qs = new URLSearchParams(params).toString();
    return qs ? base + '?' + qs : base;
  }

  const deepLink = buildDeepLink();
  document.getElementById('deeplink-btn').href = deepLink;

  // Auto-redirect immediately
  window.location.href = deepLink;

  // Fallback: if still here after 1.5s the app didn't open (not installed / simulator)
  setTimeout(function() {
    document.querySelector('.status').innerHTML =
      "If the app didn't open, tap the button above or make sure CaliSpot is installed.";
  }, 1500);
</script>
</body>
</html>
